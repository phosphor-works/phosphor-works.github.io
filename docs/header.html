<!-- Pre-paint theme sync.  Reads `phosphor-theme` from localStorage
     (the same key the Astro site uses) so the doxygen pages honor
     the user's dark/light choice across the site boundary.  We set
     THREE state flags so every downstream CSS rule has something to
     key on:
       • html[data-theme] — site convention (our own rules)
       • html.dark-mode   — doxygen-awesome's dark rules
       • html.light-mode  — explicit opt-out from the @media
         (prefers-color-scheme: dark) { html:not(.light-mode) {...} }
         block in customdoxygen.css.  Without it, a user on OS-dark
         who picks Light on our site still gets dark colors because
         the media-query path still matches.
     Inline + synchronous so no flash. -->
<script>
  (function () {
    function apply(t) {
      var html = document.documentElement;
      html.dataset.theme = t;
      html.classList.toggle("dark-mode",  t === "dark");
      html.classList.toggle("light-mode", t === "light");
    }
    try {
      var t = localStorage.getItem("phosphor-theme");
      if (t !== "dark" && t !== "light") {
        t = matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark";
      }
      apply(t);
    } catch (e) {
      apply("dark");
    }
  })();
</script>

<script type="text/javascript">
    document.addEventListener("DOMContentLoaded", function () {
        if (typeof hljs !== "undefined") {
            document.querySelectorAll(".hljs-fragment code.hljs").forEach(function (el) {
                hljs.highlightElement(el);
            });
        }
    });
