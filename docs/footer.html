<!-- HTML footer for doxygen 1.9.x.  Keeps the default Doxygen-generated
     attribution (required for Doxygen's nav logic) and appends a small
     Phosphor-branded footer band. -->
<!-- Doxygen's built-in nav-path breadcrumb + generator attribution is
     the only footer we render.  An earlier .pz-footer band duplicated
     the Home / Palette / GitHub links that already live in the
     sticky .pz-topbar (header.html); keeping both caused the two
     bars to overlap at the bottom of the viewport when scrolled. -->
<!--BEGIN GENERATE_TREEVIEW-->
<div id="nav-path" class="navpath"><!-- id is needed for treeview function! -->
  <ul>
    $navpath
    <li class="footer">$generatedby <a href="https://www.doxygen.org/index.html"><img class="footer" src="$relpath^doxygen.svg" width="104" height="31" alt="doxygen"/></a> $doxygenversion</li>
  </ul>
</div>
<!--END GENERATE_TREEVIEW-->
<!--BEGIN !GENERATE_TREEVIEW-->
<hr class="footer"/><address class="footer"><small>
$generatedby&#160;<a href="https://www.doxygen.org/index.html"><img class="footer" src="$relpath^doxygen.svg" width="104" height="31" alt="doxygen"/></a> $doxygenversion
</small></address>
<!--END !GENERATE_TREEVIEW-->
</body>
</html>
